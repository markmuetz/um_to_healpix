      │  │  ░░░░░┌────────────────────┐░░░░░░░░░░░░░░░░░░░░░  │        │
      │  │  ░░░░░│   Africa (data)    │░░░░░░░░░░░░░░░░░░░░░  │        │
      │  │  ░░░░░└────────────────────┘░░░░░░░░░░░░░░░░░░░░░  │        │
      │  │  ░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░  │        │
