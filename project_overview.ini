      │  │  ░░░░│ Africa (z9)  │░░░░░░░░░░░░░░░░░░░░░░░░░░░  │        │
      │  │  ░░░░└──────────────┘░░░░░░░░░░░░░░░░░░░░░░░░░░░  │        │
      │  │  ░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░  │        │
      │  │  Shape: (time, 4^9) with updated active bounds     │        │
