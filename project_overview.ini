# ----------------------------------------------------------------------------
# Purpose:
#   Human-readable, detailed project reference for um_to_healpix.
#
# Format notes:
#   - INI comments use '#' (also ';' in many parsers).
#   - Multi-line values are represented by indenting continuation lines.
#   - This file is intended for documentation/readability rather than strict
#     machine parsing by minimal INI readers.
#
# Maintenance notes:
#   - Update this file when major workflow, CLI, module, or dependency changes
#     are made.
#   - Keep section names stable where possible to make diffs easy to review.
# ============================================================================

# Core package metadata and identity.
[project]
# Canonical package/distribution name.
name = um_to_healpix
# Project semantic or release version.
version = 0.1
# Short one-line description of the project.
summary = Tools for converting Unified Model (UM) output from lat/lon grids to HEALPix and writing directly to Zarr in JASMIN object storage.
# Operational maturity/context for consumers.
status = Research/operations-oriented processing toolkit developed for WCRP Hackathon 2025.
# Main scientific/technical domain this package supports.
primary_domain = High-resolution climate and weather simulation post-processing.
# License identifier for redistribution and usage.
license = BSD-3-Clause
# Main author/maintainer attribution.
author = Mark Muetzelfeldt
# Source repository URL.
repository = https://github.com/markmuetz/um_to_healpix
# Minimum supported Python runtime.
python_requirement = >=3.12

# Why the project exists and what it is solving.
[purpose]
# Expanded problem framing in domain terms.
problem_statement =
    UM simulation outputs are produced on latitude/longitude-oriented model grids, while downstream global analysis and visualization pipelines can benefit from HEALPix tiling and chunking.
    This project provides a robust conversion and coarsening workflow that supports global and regional simulations, avoids large intermediate files,
    and is resilient to interruptions by using done-file based incremental processing.

# Concrete objectives the implementation is designed to satisfy.
core_objectives =
    1) Convert UM .pp fields to HEALPix-aligned xarray datasets.
    2) Persist output as cloud-accessible Zarr stores in JASMIN object storage.
    3) Process incrementally as new source files arrive.
    4) Enable restart/recovery via per-task completion markers.
    5) Support both full-resolution writing and lower-zoom coarsening.

# Runtime and infrastructure assumptions for expected operation.
[execution_context]
# Platform assumptions for scheduler/storage/access model.
platform_assumptions =
    Designed primarily for JASMIN workflows with SLURM scheduling, access to required GWS areas, and write/read access to object store tenancy.

# Data movement policy (read path, write path, intermediate policy).
data_locality_model =
    Reads source UM files from JASMIN filesystems and writes directly to object-store-backed Zarr paths.
    Intermediate datasets are intentionally minimized to reduce storage cost and failure surfaces.

# End-to-end process stages from orchestration to coarsening.
[high_level_workflow]
# Stage 1: discover pending work and prepare batch payloads.
step_1_discover_and_plan =
    `um-slurm-control` inspects configured simulations, determines outstanding work by comparing expected tasks against existing done files,
    and creates SLURM-compatible task payloads.

# Stage 2: initialize destination stores and metadata templates.
step_2_initialize_store =
    On the first relevant timestep/output version combination, empty/template Zarr stores are created for required zoom levels
    using metadata inferred from UM fields and simulation configuration.

# Stage 3: execute conversion tasks and write outputs.
step_3_regrid_and_write =
    `um-process-tasks` executes array-indexed tasks:
    - loads UM .pp content,
    - maps cube metadata to consistent DataArray naming,
    - performs required interpolation and sign adjustments,
    - regrids to HEALPix,
    - writes regional/time-variable slices to Zarr with region writes.

# Stage 4: persist completion state for incremental reruns.
step_4_mark_completion =
    After a unit of work completes, a done file is written/updated so reruns skip completed items.

# Stage 5: generate lower-zoom products from high-zoom coverage.
step_5_coarsen_levels =
    Once highest zoom coverage is available for required windows, coarsening workflows derive lower zoom levels.
    For regional data, coarsening logic preserves meaningful domain statistics via active-chunk and weight handling.

# UM DYAMOND3 PROCESSING PIPELINE - System Architecture
[um_dyamond3_processing_pipeline_system_architecture]
# Architectural style used by the pipeline.
architecture_style =
        Controller-worker batch pipeline with SLURM array orchestration, object-store-backed Zarr persistence,
        and done-file-driven idempotent task state management.

# Primary deployment/runtime environment assumptions.
runtime_environment =
        JASMIN HPC environment with:
        - source data on GWS/shared filesystems,
        - SLURM for scheduling,
        - S3-compatible JASMIN object store for output artifacts,
        - Python/xarray/dask/iris runtime in managed conda environment.

# Main logical layers and responsibilities.
architecture_layers =
        1) Control Plane:
             - `um-slurm-control` reads config, discovers remaining work, emits job manifests/scripts,
                 and dispatches SLURM array workloads with concurrency limits.
        2) Task Execution Plane:
             - `um-process-tasks` executes one work unit per array index,
                 selecting task type (init/regrid/coarsen) from generated job definitions.
        3) Data Transformation Plane:
             - iris cube extraction,
             - variable mapping and harmonization,
             - interpolation/sign corrections,
             - lat/lon -> HEALPix remapping.
        4) Storage Plane:
             - metadata/template store creation,
             - regional/time-slice region writes,
             - multi-zoom coarsened product generation.
        5) State/Recovery Plane:
             - done files as durable completion markers,
             - rerun control via selective done deletion or output lineage bump.

# Core modules/components and what each contributes.
component_catalog =
        - `config/*.py`:
            authoritative simulation definitions (paths, groups, chunks, mappings, output templates).
        - `um_to_healpix.um_slurm_control`:
            orchestration CLI and SLURM array submission logic.
        - `um_to_healpix.um_process_tasks`:
            per-task execution entry point and dispatch.
        - `um_to_healpix.latlon_to_healpix`:
            remapping engine.
        - `um_to_healpix.healpix_coarsen`:
            lower zoom generation.
        - `um_to_healpix.cube_to_da_mapping`:
            source-cube to output-variable mapping semantics.
        - `um_to_healpix.util`:
            shared helpers (constraints, config loading, data access helpers).

# End-to-end control flow in execution order.
control_flow_sequence =
        1) Operator chooses simulation/config and invokes controller CLI.
        2) Controller scans expected tasks vs existing done files.
        3) Controller emits task manifest + SLURM script and submits array.
        4) Worker resolves array index -> concrete processing task.
        5) Worker initializes stores if required (first-run path).
        6) Worker loads source .pp data and applies mapping/transforms.
        7) Worker writes mapped fields to target Zarr regions.
        8) Worker emits done marker for completed task unit.
        9) After high-zoom completeness conditions are met, coarsening tasks run.
        10) Lower zoom products are persisted and marked complete.

# Data flow and artifacts across system boundaries.
data_flow_path =
        Source UM .pp files (GWS) -> iris cubes -> mapped/transformed arrays -> HEALPix arrays ->
        Zarr region writes (s3://sim-data/{deploy}/{output_vn}/{sim}/um.{freq}.hp_z{zoom}.zarr)
        plus sidecar done files ({sim}/{output_vn}/{task}_{date}.done) on shared filesystem.

# State model and idempotency semantics.
state_management_model =
        Task completion state is externalized as done files.
        Job planning is recomputed each run from desired task set minus completed state.
        This allows safe incremental continuation after interruptions.

# Failure handling and recovery strategy.
fault_tolerance_and_recovery =
        - transient write/read/scheduler issues are handled by rerunning only incomplete tasks,
        - partial progress is preserved,
        - forced reprocessing can be scoped to one task/date by deleting specific done markers,
        - full lineage regeneration is achieved via output namespace change (deploy/output_vn).

# Scalability and throughput design controls.
scaling_and_throughput =
        Horizontal scaling via SLURM arrays over dates/tasks with configured concurrency cap,
        zoom-specific chunking for IO efficiency,
        and region writes to avoid rewriting full stores.

# Global vs regional path differences.
global_vs_regional_architecture =
        - Global runs generally use add_cyclic-enabled remapping and global chunk policies.
        - Regional runs use active-domain-aware chunking/weight handling and may disable cyclic behavior.
        - Coarsening for regional data preserves consistent domain statistics across zooms.

# Key operational observability points.
observability_points =
        - SLURM queue status and job logs,
        - done-file cardinality/progression,
        - object-store path population by freq/zoom,
        - plotting/notebook sanity checks from output_testing assets.

# Security/access dependencies for successful operation.
access_and_prerequisites =
        Requires valid access to:
        - source GWS areas,
        - object store tenancy and credentials,
        - compute account/qos/partition for SLURM execution.

# High-level architecture synopsis.
architecture_summary =
        The UM DYAMOND3 processing system is a resilient, restart-friendly, batch-distributed pipeline that cleanly separates
        orchestration, transformation, storage, and completion state, enabling large-volume incremental conversion of UM outputs
        into cloud-native HEALPix/Zarr products across multiple simulation families.
