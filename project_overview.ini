# HEALPix grid structure and properties.
healpix_grid_structure =
    ┌─────────────────────────────────────────────────────────────────────────┐
    │                    HEALPIX GRID STRUCTURE                               │
    │       (Hierarchical Equal Area isoLatitude Pixelization)                │
    └─────────────────────────────────────────────────────────────────────────┘
    
    FUNDAMENTAL PROPERTIES:
    ──────────────────────
    1. Equal-Area: All pixels have exactly the same surface area
    2. Hierarchical: Each zoom level subdivides parent pixels into 4 children
    3. Iso-Latitude: Pixels aligned in rings of constant latitude
    4. Efficient: Fast spherical harmonic transforms and neighbor queries
    
    ═══════════════════════════════════════════════════════════════════════════
    BASE STRUCTURE (z0 - Root Level)
    ═══════════════════════════════════════════════════════════════════════════
    
      The sphere is divided into 12 base pixels arranged as:
      
      ┌─────────────────────────────────────────────────────────────────┐
      │         HEALPIX BASE RESOLUTION (NSIDE=1, 12 pixels)            │
      │                                                                  │
      │                         North Pole                               │
      │                            ╱╲                                    │
      │                          ╱ 0 ╲                                   │
      │                        ╱╲    ╱╲                                  │
      │                      ╱ 1 ╲╱ 2 ╲                                  │
      │                    ╱╲    ╱╲    ╱╲                                │
      │                  ╱ 3 ╲╱ 4 ╲╱ 5 ╲                                 │
      │                ╱      ╱    ╲      ╲                              │
      │              ╱──────╱────────╲──────╲                            │
      │            ╱      ╱ Equator  ╲      ╲                            │
      │          ╱──────╱──────────────╲──────╲                          │
      │        ╱      ╱                  ╲      ╲                        │
      │      ╱  6   ╱         7            ╲  8   ╲                      │
      │    ╱      ╱             ╲            ╲      ╲                    │
      │  ╱──────╱─────────────────╲────────────╲──────╲                 │
      │ ╱      ╱                    ╲            ╲      ╲                │
      │ ╲  9  ╱          10           ╲     11    ╲      ╱               │
      │  ╲   ╱                          ╲           ╲   ╱                │
      │   ╲ ╱                             ╲          ╲ ╱                 │
      │    ╲                                ╲         ╱                  │
      │     ╲                                ╲       ╱                   │
      │      ╲                                ╲     ╱                    │
      │       ╲                                ╲   ╱                     │
      │        ╲                                ╲ ╱                      │
      │         ╲                                ╱                       │
      │          ╲                              ╱                        │
      │           ╲                            ╱                         │
      │            ╲                          ╱                          │
      │             ╲                        ╱                           │
      │              ╲                      ╱                            │
      │                    South Pole                                    │
      └──────────────────────────────────────────────────────────────────┘
      
      Key Facts (z0):
        - NSIDE = 1
        - Number of pixels = 12 × NSIDE² = 12
        - Pixel area = 4π / 12 steradians ≈ 1.047 sr each
        - Coverage = entire sphere
    
    ═══════════════════════════════════════════════════════════════════════════
    HIERARCHICAL SUBDIVISION (Zoom Levels)
    ═══════════════════════════════════════════════════════════════════════════
    
      Each pixel subdivides into 4 children at the next zoom level:
      
      Zoom n → Zoom n+1 (4:1 Subdivision):
      
        Parent Pixel (zoom n)          Children Pixels (zoom n+1)
        ┌───────────────┐              ┌───────┬───────┐
        │               │              │   0   │   1   │
        │               │     ═══>     ├───────┼───────┤
        │               │              │   2   │   3   │
        │               │              └───────┴───────┘
        └───────────────┘
          1 pixel                        4 pixels
          
      Numbering Convention:
        - Within each parent, children numbered 0-3
        - NW=0, NE=1, SW=2, SE=3 (conceptual orientation)
        - Actual layout preserves iso-latitude property
    
    ═══════════════════════════════════════════════════════════════════════════
    ZOOM LEVEL PROPERTIES
    ═══════════════════════════════════════════════════════════════════════════
    
      ┌──────┬──────────┬────────────────┬──────────────┬─────────────────┐
      │ Zoom │  NSIDE   │  Total Pixels  │  Pixel Size  │  Approx Res     │
      │      │          │   (12×NSIDE²)  │  (degrees)   │  (km at equator)│
      ├──────┼──────────┼────────────────┼──────────────┼─────────────────┤
      │  0   │    1     │      12        │    58.6°     │   ~6500 km      │
      │  1   │    2     │      48        │    29.3°     │   ~3250 km      │
      │  2   │    4     │     192        │    14.7°     │   ~1625 km      │
      │  3   │    8     │     768        │     7.3°     │    ~810 km      │
      │  4   │   16     │   3,072        │     3.7°     │    ~405 km      │
      │  5   │   32     │  12,288        │     1.8°     │    ~200 km      │
      │  6   │   64     │  49,152        │     0.92°    │    ~100 km      │
      │  7   │  128     │ 196,608        │     0.46°    │     ~50 km      │
      │  8   │  256     │ 786,432        │     0.23°    │     ~25 km      │
      │  9   │  512     │ 3,145,728      │     0.11°    │     ~12 km      │
      │ 10   │ 1024     │ 12,582,912     │     0.057°   │      ~6 km      │
      └──────┴──────────┴────────────────┴──────────────┴─────────────────┘
      
      Relationship:
        NSIDE(zoom) = 2^zoom
        Npixels(zoom) = 12 × 4^zoom
        
      UM Simulation Mapping:
        - N2560 (~5km) → z10 (1024 NSIDE, ~6km pixels)
        - N1280 (~10km) → z9 (512 NSIDE, ~12km pixels)
    
    ═══════════════════════════════════════════════════════════════════════════
    PIXEL INDEXING & COORDINATES
    ═══════════════════════════════════════════════════════════════════════════
    
      Nested Indexing Scheme (used in this pipeline):
      
      ┌──────────────────────────────────────────────────────────────────┐
      │  Zoom 0 (12 pixels):       Zoom 1 (48 pixels):                   │
      │  ┌────┬────┬────┐          ┌──┬──┬──┬──┬──┬──┬──┬──┐            │
      │  │ 0  │ 1  │ 2  │          │0 │1 │4 │5 │8 │9 │12│13│            │
      │  ├────┼────┼────┤          ├──┼──┼──┼──┼──┼──┼──┼──┤            │
      │  │ 3  │ 4  │ 5  │          │2 │3 │6 │7 │10│11│14│15│            │
      │  ├────┼────┼────┤          ├──┼──┼──┼──┼──┼──┼──┼──┤            │
      │  │ 6  │ 7  │ 8  │          │16│17│20│21│24│25│28│29│            │
      │  ├────┼────┼────┤          ├──┼──┼──┼──┼──┼──┼──┼──┤            │
      │  │ 9  │ 10 │ 11 │          │18│19│22│23│26│27│30│31│            │
      │  └────┴────┴────┘          ├──┼──┼──┼──┼──┼──┼──┼──┤            │
      │                             │...                   │            │
      │                             └──────────────────────┘            │
      │                                                                  │
      │  Parent-Child Relationship:                                     │
      │    parent_index = child_index // 4                              │
      │    child_offset = child_index % 4                               │
      │    children of pixel p at zoom n:                               │
      │      [4p+0, 4p+1, 4p+2, 4p+3] at zoom n+1                      │
      └──────────────────────────────────────────────────────────────────┘
      
      Coordinate Mapping:
        - Each pixel has center coordinates (clon, clat)
        - Stored as auxiliary coords in xarray Datasets
        - Used for plotting, spatial queries, regional masking
    
    ═══════════════════════════════════════════════════════════════════════════
    EQUAL-AREA PROPERTY (Critical for Climate Science)
    ═══════════════════════════════════════════════════════════════════════════
    
      Why Equal-Area Matters:
      
      ┌──────────────────────────────────────────────────────────────────┐
      │  Regular Lat/Lon Grid:            HEALPix Grid:                  │
      │                                                                   │
      │    North Pole                       North Pole                   │
      │  ████████████████ 0.1° cells      ▓▓▓▓▓▓▓▓▓▓▓▓ equal area        │
      │  ████████████████ (tiny area)     ▓▓▓▓▓▓▓▓▓▓▓▓                   │
      │   ▓▓▓▓▓▓▓▓▓▓▓▓▓▓ mid-lat          ▓▓▓▓▓▓▓▓▓▓▓▓                   │
      │   ▓▓▓▓▓▓▓▓▓▓▓▓▓▓                  ▓▓▓▓▓▓▓▓▓▓▓▓                   │
      │   ░░░░░░░░░░░░░░ equator          ▓▓▓▓▓▓▓▓▓▓▓▓                   │
      │   ░░░░░░░░░░░░░░ (large area)     ▓▓▓▓▓▓▓▓▓▓▓▓                   │
      │                                                                   │
      │  Area varies by ~cos(lat)         ALL pixels same area           │
      │  Need cos(lat) weighting          Direct averaging valid         │
      └──────────────────────────────────────────────────────────────────┘
      
      Benefits for UM Processing:
        1. Global means computed without latitude weighting
        2. Flux conservation automatic during remapping
        3. Coarsening preserves domain integrals exactly
        4. Statistical analyses robust across all regions
    
    ═══════════════════════════════════════════════════════════════════════════
    ISO-LATITUDE RINGS
    ═══════════════════════════════════════════════════════════════════════════
    
      Pixels organized in rings parallel to equator:
      
      ┌──────────────────────────────────────────────────────────────────┐
      │         Latitude Ring Structure                                  │
      │                                                                   │
      │         North Pole Cap                                           │
      │              ⬡                                                    │
      │            ⬡ ⬡ ⬡         Ring 0: 4 pixels                        │
      │          ⬡ ⬡ ⬡ ⬡       Ring 1: 4 pixels                        │
      │        ⬡ ⬡ ⬡ ⬡ ⬡ ⬡   Ring 2: 8 pixels (entering equatorial)   │
      │   ───────────────────────────────────                            │
      │   ⬡ ⬡ ⬡ ⬡ ⬡ ⬡ ⬡ ⬡   Equatorial Band                          │
      │   ⬡ ⬡ ⬡ ⬡ ⬡ ⬡ ⬡ ⬡   (2/3 of pixels)                          │
      │   ⬡ ⬡ ⬡ ⬡ ⬡ ⬡ ⬡ ⬡   Each ring: 4×NSIDE pixels                │
      │   ⬡ ⬡ ⬡ ⬡ ⬡ ⬡ ⬡ ⬡                                            │
      │   ───────────────────────────────────                            │
      │        ⬡ ⬡ ⬡ ⬡ ⬡ ⬡                                            │
      │          ⬡ ⬡ ⬡ ⬡                                                │
      │            ⬡ ⬡ ⬡                                                 │
      │              ⬡                                                    │
      │         South Pole Cap                                           │
      └──────────────────────────────────────────────────────────────────┘
      
      Structure:
        - Polar caps: 4 rings each, varying pixel count
        - Equatorial band: 8×NSIDE-8 rings, 4×NSIDE pixels per ring
        - Total: 4×NSIDE rings covering entire sphere
    
    ═══════════════════════════════════════════════════════════════════════════
    COMPARISON WITH LAT/LON GRIDS
    ═══════════════════════════════════════════════════════════════════════════
    
      ┌───────────────────┬──────────────────────┬──────────────────────┐
      │   Property        │   Lat/Lon Grid       │   HEALPix Grid       │
      ├───────────────────┼──────────────────────┼──────────────────────┤
      │ Cell area         │ Varies w/ latitude   │ Exactly equal        │
      │ Pole singularity  │ Yes (convergent)     │ No (well-behaved)    │
      │ Grid structure    │ Regular rectangular  │ Irregular iso-lat    │
      │ Indexing          │ 2D (lat, lon)        │ 1D (cell) nested     │
      │ Neighbor access   │ Simple (i±1, j±1)    │ Via healpix lib      │
      │ Hierarchical      │ No (requires interp) │ Yes (exact 4:1)      │
      │ Sky surveys       │ Awkward              │ Designed for         │
      │ Global stats      │ Need weights         │ Direct averaging     │
      │ Visualization     │ Native in tools      │ Requires transform   │
      └───────────────────┴──────────────────────┴──────────────────────┘
    
    ═══════════════════════════════════════════════════════════════════════════
    HEALPIX IN UM PIPELINE CONTEXT
    ═══════════════════════════════════════════════════════════════════════════
    
      Transformation Flow:
      
      UM Native (Lat/Lon)              HEALPix Multi-Zoom
      ┌────────────────┐               ┌──────────────────┐
      │ N2560: 5120×10240             │  z10: 12,582,912  │
      │ ~5km resolution │   ══════>    │  ~6km pixels      │
      │                 │   regrid     │  equal area       │
      │ Poles: tiny     │              │  no singularity   │
      │ Equator: large  │              │                   │
      └────────────────┘               └──────────────────┘
                                             │
                                             │ coarsen
                                             ▼
                                       ┌──────────────────┐
                                       │  z9: 3,145,728   │
                                       │  ~12km pixels    │
                                       └──────────────────┘
                                             │
                                             │ coarsen
                                             ▼
                                       ┌──────────────────┐
                                       │  z0: 12 pixels   │
                                       │  global summary  │
                                       └──────────────────┘
      
      Storage Benefits:
        - Multi-resolution access without regeneration
        - Hierarchical queries (drill down from z0 → z10)
        - Cloud-native chunking aligned with grid structure
        - Efficient spatial subsetting
      
      Analysis Benefits:
        - No latitude-weighting artifacts
        - Consistent global statistics
        - Clean coarsening (no interpolation artifacts)
        - Compatible with spherical harmonic analysis
    
    ═══════════════════════════════════════════════════════════════════════════
    LIBRARIES & TOOLS
    ═══════════════════════════════════════════════════════════════════════════
    
      Core HEALPix Library (Python):
        - healpix: pixel indexing, coordinate conversion
        - healpy: spherical harmonics, visualization (not used here)
        
      Remapping:
        - easygems: UM lat/lon → HEALPix regridding
        - Generates conservative area-weighted interpolation
        
      Storage:
        - xarray: coordinates (cell, clon, clat)
        - zarr: chunked storage of cell dimension
        
      Visualization:
        - Custom plotting tools (um_to_healpix.plotting)
        - Transform to lat/lon for standard map projections
    
    ═══════════════════════════════════════════════════════════════════════════
    REFERENCES
    ═══════════════════════════════════════════════════════════════════════════
    
      HEALPix Official:
        https://healpix.jpl.nasa.gov/
        
      Original Paper:
        Górski et al. (2005), "HEALPix: A Framework for High-Resolution
        Discretization and Fast Analysis of Data Distributed on the Sphere"
        
      Pipeline Implementation:
        - src/um_to_healpix/latlon_to_healpix.py
        - src/um_to_healpix/healpix_coarsen.py

# Reliability mechanisms and controlled rerun behavior.
[reliability_and_recovery]
# Idempotency/resume mechanism used in production runs.
restart_strategy =
    Done-file tracking is the main idempotency mechanism.
    Interrupted runs can be resumed without replaying all work.

# Operator controls for partial or full reprocessing.
replay_controls =
    - Delete a specific done file to rerun one task.
    - Change config output version/deploy values to create a new processing lineage.

# Primary classes of failure this workflow explicitly addresses.
failure_domains_addressed =
    - source data availability and staggered transfer arrival,
    - object store write instability/transient errors,
    - SLURM job interruptions.

# Mapping of key modules and their responsibilities.
[module_map]
# Orchestrator entrypoint: task planning/dispatch.
entry_um_slurm_control =
    CLI entry point for orchestration. Builds task inventories, writes job definitions/scripts, and dispatches SLURM arrays.

# Worker entrypoint: executes one scheduled unit.
entry_um_process_tasks =
    Worker entry point for executing one task unit selected by array index.

# Parsing/inspection helper for SLURM outputs.
entry_um_parse_slurm =
    Utility entry point for parsing/inspecting SLURM-related execution information.

# Lat/lon to HEALPix transformation implementation.
module_latlon_to_healpix =
    Core regridding implementation from source lat/lon model representation to HEALPix target layout.

# Zoom coarsening implementation.
module_healpix_coarsen =
    Multi-zoom coarsening logic for global and regional outputs.

# Iris-cube to xarray DataArray normalization/mapping.
module_cube_to_da_mapping =
    Mapping utilities that transform iris cube metadata/variables into standardized xarray DataArray naming and structure.

# Shared utility functionality.
module_util =
    Shared utility helpers for common operations and processing support.

# Plotting-related package components.
module_plotting =
    Optional plotting-related package components.

# Registered command-line interfaces and intent.
[cli_commands]
# Primary control-plane CLI.
command_um_slurm_control =
    `um-slurm-control` manages processing lifecycle (list simulations, print config, launch processing, incremental reruns).

# Data-plane worker CLI.
command_um_process_tasks =
    `um-process-tasks` executes task payloads generated by controller orchestration.

# SLURM parsing utility CLI.
command_um_parse_slurm =
    `um-parse-slurm` supports SLURM log/task interpretation workflows.

# Configuration format and operational controls.
[configuration_model]
# Filesystem location pattern for config modules.
location = config/*.py
# Chosen config style.
style = Python-dict-native configuration modules.
# Reason this style was chosen over alternatives (e.g., YAML).
rationale =
    Python configs enable reuse/composition (shared values/constants/functions) that would be cumbersome in static YAML.

# Typical options users/operators are expected to edit.
typical_controls =
    - simulation selection identifiers,
    - output version/deploy namespace,
    - done-file and weight directories,
    - processing ranges and per-simulation settings.

# How output/deploy values affect run lineage and reproducibility.
note_on_processing_lineage =
    output version and deploy values influence done-file namespaces and output object-store destination,
    making them key controls for controlled reruns and versioned datasets.

# Domain-specific data conventions handled by the pipeline.
[data_handling_notes]
# Main source data format.
source_format = UM .pp files (often with 12-hour spans).
# Time/coordinate harmonization behavior.
coordinate_alignment =
    UM timestamps and field conventions can vary by variable/class.
    The pipeline applies harmonization rules (e.g., shifting inconsistent time conventions to canonical boundaries where needed).

# Grid staggering, variable conventions, and interpolation notes.
grid_and_variable_complexities =
    - Different variables may live on different grid conventions (e.g., Arakawa A vs C), requiring interpolation.
    - Some variables on model levels are interpolated to pressure levels.
    - Some signs are flipped to match standard conventions.
    - Precipitation components may be combined depending on simulation characteristics.

# Specific strategy for regional datasets.
regional_processing_strategy =
    Regional runs optimize storage by writing active chunks and maintaining required weighting/coarsening behavior
    to preserve meaningful spatial/domain aggregates across zoom levels.

# Storage backend, write strategy, and IO implications.
[storage_and_io]
# Destination data format.
target_format = Zarr
# Storage backend abstraction and deployment target.
backend = s3fs/object-store compatible layout (JASMIN tenancy)
# Write patterns used for initialization and updates.
write_pattern =
    - Template writes for store initialization (`compute=False` style metadata-first creation).
    - Region writes for incremental variable/time updates.

# Why this storage pattern is useful operationally.
operational_benefits =
    - Scalable cloud/object-store access pattern,
    - chunked partial reads/writes,
    - compatibility with xarray/dask analytics.

# Runtime dependencies and notable roles.
[dependencies]
# Main install/runtime package set.
runtime_packages =
    cartopy, click, dask, easygems, healpix, scitools-iris, loguru, numpy,
    pandas, s3fs, stratify, xarray, remake.

# Key dependency responsibilities at a glance.
notable_tools =
    - click: CLI framework,
    - dask/xarray: chunked compute and array orchestration,
    - iris: UM/cube handling,
    - s3fs: object store integration,
    - loguru: enhanced logging.

# Install sequence and infra prerequisites for a working environment.
[installation_summary]
# Recommended installation flow.
recommended_method =
    1) Clone repository.
    2) Create conda env from `envs/um2hp_env.yml`.
    3) Activate env and install package in editable mode (`pip install -e .`).
    4) Validate CLI installation with `um-slurm-control --help`.

# Required infrastructure permissions/credentials.
infrastructure_prerequisites =
    - JASMIN group workspace access (e.g., kscale/hrcm as needed),
    - object store tenancy access (hackathon-o),
    - configured `~/.s3cfg` credentials for s3cmd/object-store operations.

# Scheduler behavior, observability, and throughput controls.
[operations_and_monitoring]
# Batch scheduler used by this pipeline.
scheduler = SLURM (array jobs for parallel task dispatch)
# Typical monitoring patterns during active runs.
monitoring_pattern =
    - queue monitoring via `squeue`/watch,
    - SLURM output logs under project output directories,
    - done-file counts for completion tracking.

# Back-pressure and service-protection strategy.
throughput_control =
    array limits are used to avoid overwhelming object storage services while maintaining pipeline progress.

# Testing and validation assets in repository.
[test_and_validation_assets]
# Test/support scripts associated with output checking.
test_related_paths =
    - `output_testing/basic_testing.py`
    - `output_testing/test_suite.py`
    - `output_testing/iris_plot_precip.py`
    - `output_testing/testing_remakefile.py`

# Notebook used for interactive validation/inspection.
notebooks =
    `notebooks/view_UM_healpix_on_JASMIN_obj_store.ipynb` provides exploratory/visual validation of produced HEALPix Zarr data.

# Quick repository map for navigation.
[project_layout_snapshot]
# Important directories and their purpose.
key_paths =
    - src/um_to_healpix/: primary package source.
    - config/: simulation configurations.
    - docs/: architecture and runbook documentation.
    - envs/: reproducible conda environment definitions.
    - notebooks/: data inspection and plotting workflows.
    - output_testing/: validation helpers and test scripts.
    - scripts/: operational utility scripts.

# Explicit limitations and assumptions to keep in mind.
[known_constraints]
# Constraints that can affect portability and behavior.
constraints =
    - Processing workflow is strongly tuned for JASMIN infrastructure assumptions.
    - Input data conventions vary between simulations/variables and require domain-specific normalization logic.
    - Regional and global workflows have different optimization/coarsening behavior and operational considerations.

# Operational rerun/version management guidance.
[change_management]
# How to safely trigger partial or complete reruns.
safe_rerun_guidance =
    For targeted reruns, remove only the corresponding done files.
    For full lineage reruns, alter config output/deploy namespace and rerun orchestration.

# Why output namespace versioning matters.
artifact_versioning =
    Versioned output namespaces are key to reproducible reruns and side-by-side comparison of processing revisions.

# Final one-line executive summary.
[summary]
# Concise high-level descriptor for quick orientation.
one_line =
    um_to_healpix is a resilient, SLURM-driven UM-to-HEALPix conversion pipeline that writes cloud-native Zarr outputs directly to JASMIN object storage with incremental restart support.
